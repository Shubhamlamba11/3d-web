<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shubham Lamba - Glass Portfolio</title>
    <style>
        /* CSS Reset & Full Screen Setup */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background-color: #ffffff; /* Pure white background */
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        /* 3D Canvas Container - sits in the background */
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Hero Section - sits on top of the 3D model */
        .hero {
            position: relative;
            z-index: 10; /* Ensures text is above the 3D canvas */
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            /* pointer-events: none ensures you can click/drag the 3D model 
               THROUGH the text area */
            pointer-events: none; 
            text-align: center;
        }

        h1 {
            font-size: 6rem;
            font-weight: 300;
            color: #1a1a1a; /* Dark grey to stand out against white/glass */
            letter-spacing: 0.2em;
            text-transform: uppercase;
            /* Very subtle text shadow to separate text from glass edges */
            text-shadow: 0 2px 10px rgba(255, 255, 255, 0.8); 
            margin-bottom: 10px;
        }

        p {
            font-size: 1.2rem;
            color: #555;
            letter-spacing: 0.5em;
            text-transform: uppercase;
        }

        /* Responsive Design for smaller screens */
        @media (max-width: 768px) {
            h1 { font-size: 3rem; letter-spacing: 0.1em; }
            p { font-size: 0.8rem; letter-spacing: 0.2em; }
        }
    </style>
</head>
<body>

    <!-- Hero Section Content -->
    <div class="hero">
        <h1>Shubham Lamba</h1>
        <p>Creative Developer & Designer</p>
    </div>

    <!-- 3D Canvas will be injected here -->
    <div id="canvas-container"></div>

    <!-- Import Three.js and required Addons -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

        // 1. Setup Scene, Camera, Renderer
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff); // Full White Background

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 0, 8);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        // Tone mapping helps make the glass look more realistic
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1;
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // 2. Setup Environment (Crucial for Glass)
        // Glass needs an environment to reflect and refract, otherwise it's invisible.
        const pmremGenerator = new THREE.PMREMGenerator(renderer);
        const roomEnv = new RoomEnvironment();
        const envTexture = pmremGenerator.fromScene(roomEnv).texture;
        scene.environment = envTexture; // Apply environment to the scene

        // 3. Setup Controls
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.enableZoom = true;
        controls.autoRotate = true; // Keep it moving
        controls.autoRotateSpeed = 2.0;

        // 4. Create the Glass 3D Model
        const geometry = new THREE.TorusKnotGeometry(1.5, 0.5, 200, 32);
        
        const material = new THREE.MeshPhysicalMaterial({
            color: 0x00ff88,       // CHANGED TO GREEN
            transmission: 1.0,     // 1.0 makes it fully transparent (like glass)
            roughness: 0.05,       // Very smooth
            metalness: 0.0,        // Not metal
            ior: 1.5,              // Index of Refraction (standard glass is ~1.5)
            thickness: 1.5,        // Gives the glass internal volume/density
            specularIntensity: 1,  // Sharpness of the light reflection
            specularColor: 0xffffff,
            envMapIntensity: 1.5   // Brightens the reflections slightly
        });

        const glassModel = new THREE.Mesh(geometry, material);
        scene.add(glassModel);

        // 5. Animation Loop
        function animate() {
            requestAnimationFrame(animate);
            
            // Update controls for smooth damping and auto-rotation
            controls.update();
            
            renderer.render(scene, camera);
        }

        animate();

        // 6. Handle Window Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>

</body>
</html>
